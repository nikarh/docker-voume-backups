name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/nikarh/docker-volume-backups

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      semver_major: ${{ steps.version.outputs.semver_major }}
      semver_minor: ${{ steps.version.outputs.semver_minor }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          current=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          bump=${{ github.event.inputs.bump }}
          IFS='.' read -r major minor patch <<< "$current"
          if [ "$bump" = "major" ]; then
            major=$((major+1))
            minor=0
            patch=0
          elif [ "$bump" = "minor" ]; then
            minor=$((minor+1))
            patch=0
          else
            patch=$((patch+1))
          fi
          next="$major.$minor.$patch"
          echo "semver_major=$major" >> "$GITHUB_OUTPUT"
          echo "semver_minor=$major.$minor" >> "$GITHUB_OUTPUT"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          sed -i -E "0,/^version = \".*\"/s//version = \"$next\"/" Cargo.toml
          cargo check
          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): v$next"

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag v${{ steps.version.outputs.version }} --unreleased

      - name: Update changelog file
        run: |
          printf "%s\n" "${{ steps.changelog.outputs.content }}" > CHANGELOG.md
          git add CHANGELOG.md
          git commit -m "chore(release): update changelog"

      - name: Create Git tag
        run: git tag v${{ steps.version.outputs.version }}

      - name: Push changes
        run: |
          git push origin HEAD
          git push origin v${{ steps.version.outputs.version }}

  build-release-image:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64/v8
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare-release.outputs.version }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:v${{ needs.prepare-release.outputs.version }}-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:${{ needs.prepare-release.outputs.version }}-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:${{ needs.prepare-release.outputs.semver_minor }}-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:${{ needs.prepare-release.outputs.semver_major }}-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:stable-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }}

  publish-release-manifest:
    needs: [prepare-release, build-release-image]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish manifests
        run: |
          docker buildx imagetools create \
            -t "$IMAGE_NAME:v${{ needs.prepare-release.outputs.version }}" \
            "$IMAGE_NAME:v${{ needs.prepare-release.outputs.version }}-amd64" \
            "$IMAGE_NAME:v${{ needs.prepare-release.outputs.version }}-arm64"
          docker buildx imagetools create \
            -t "$IMAGE_NAME:${{ needs.prepare-release.outputs.version }}" \
            "$IMAGE_NAME:${{ needs.prepare-release.outputs.version }}-amd64" \
            "$IMAGE_NAME:${{ needs.prepare-release.outputs.version }}-arm64"
          docker buildx imagetools create \
            -t "$IMAGE_NAME:${{ needs.prepare-release.outputs.semver_minor }}" \
            "$IMAGE_NAME:${{ needs.prepare-release.outputs.semver_minor }}-amd64" \
            "$IMAGE_NAME:${{ needs.prepare-release.outputs.semver_minor }}-arm64"
          docker buildx imagetools create \
            -t "$IMAGE_NAME:${{ needs.prepare-release.outputs.semver_major }}" \
            "$IMAGE_NAME:${{ needs.prepare-release.outputs.semver_major }}-amd64" \
            "$IMAGE_NAME:${{ needs.prepare-release.outputs.semver_major }}-arm64"
          docker buildx imagetools create \
            -t "$IMAGE_NAME:stable" \
            "$IMAGE_NAME:stable-amd64" \
            "$IMAGE_NAME:stable-arm64"
          docker buildx imagetools create \
            -t "$IMAGE_NAME:latest" \
            "$IMAGE_NAME:latest-amd64" \
            "$IMAGE_NAME:latest-arm64"

  create-github-release:
    needs: [prepare-release, publish-release-manifest]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare-release.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare-release.outputs.version }}
          name: v${{ needs.prepare-release.outputs.version }}
          body_path: CHANGELOG.md
