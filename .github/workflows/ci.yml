name: ci

on:
  pull_request:
  push:
    branches: [main, master, dev]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/nikarh/docker-volume-backups

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings -D clippy::pedantic

      - name: Tests
        run: cargo test --locked

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Cargo deny
        run: cargo deny check

      - name: Build release
        run: cargo build --locked --release

      - name: Build container image
        run: docker build -t fileserver-backup:ci .

  publish-main-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64/v8
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    needs: lint-test-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:main-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-${{ matrix.arch }}

  publish-main-manifest:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: publish-main-image
    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish manifest
        run: |
          docker buildx imagetools create \
            -t "$IMAGE_NAME:main" \
            "$IMAGE_NAME:main-amd64" \
            "$IMAGE_NAME:main-arm64"
          docker buildx imagetools create \
            -t "$IMAGE_NAME:sha-${{ github.sha }}" \
            "$IMAGE_NAME:sha-${{ github.sha }}-amd64" \
            "$IMAGE_NAME:sha-${{ github.sha }}-arm64"

  publish-dev-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    needs: lint-test-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:dev
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
